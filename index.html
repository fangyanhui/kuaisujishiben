<style>
*{box-sizing:border-box}
body{margin:0;padding:6px;background:#f6f6f6;font-family:system-ui,sans-serif;max-width:420px;margin:0 auto}

.page-title{
  text-align:center;
  font-weight:bold;
  font-size:17px;
  color:#333;
  margin:6px 0;
  line-height:1.2;
}

.top-btn-bar{
  display:flex;
  gap:4px;
  margin-bottom:8px;
}
.top-btn-bar button{
  flex:1;
  padding:8px;
  font-size:14px;
  border-radius:6px;
  border:none;
  background:#777;
  color:#fff;
  cursor:pointer;
}

.main-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin:0 0 8px 0}
.item{padding:6px 4px;text-align:center;border:1px solid #ccc;border-radius:4px;background:#fff;font-size:13px;cursor:pointer}
.item.active{background:#4CAF50;color:#fff;border-color:#4CAF50}

.pill{display:inline-block;padding:6px 4px;margin:1px;border-radius:4px;border:1px solid #ccc;font-size:13px;cursor:pointer}
.pill.active{background:#4CAF50;color:#fff}
.pill.inactive{background:#fff;color:#000}
.pill.leader{background:#fff;color:#2196F3;border:1px solid #2196F3}

.level-row{display:flex;gap:3px;margin:8px 0}
.level-row select{
  flex:1;padding:8px;border-radius:6px;border:1px solid #ccc;font-size:14px;
  color:#333;
}
.select-placeholder{color:#999}

.input-row{
  display:flex;gap:4px;margin:8px 0
}
.input-row input{flex:2;padding:8px;border-radius:6px;border:1px solid #ccc;font-size:14px}
.input-row select{flex:1;padding:8px;border-radius:6px;border:1px solid #ccc;font-size:14px}

input::placeholder{color:#999}
button{background:#2196F3;color:white;border:none;cursor:pointer;border-radius:6px}
button.gray{background:#777}
button.red{background:#f44}
button.star{background:#FFB800;color:#222;font-weight:bold}

.btn-bar{display:flex;gap:4px;margin:8px 0}
.btn-bar button{flex:1;padding:8px;font-size:14px}

.record-card{
  background:#fff;
  border:1px solid #ddd;
  border-radius:6px;

  margin-bottom:1px;

  height:auto;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  justify-content:space-between;
}

.record-header{
  position:relative;
  display:flex;
  align-items:flex-start;
  gap:4px;
  line-height:1.4;
  min-height:2.0em;
}

.record-star{
  font-size:14px;

  padding:0 2px;

  flex-shrink:0;
  line-height:1.4;
}

.record-title{

  padding-right:3px;
  line-height:1.4;
}

.record-time{

}

.record-people{

}

.record-note{

.record-btns button{flex:1;padding:2px;font-size:12px}

.all-page{display:none}

.modal{

</style>

<script>
// ====================== 局部刷新逻辑 ======================
let isEditing = false;

// 接收同步通知
window.addEventListener('message', function(e) {
  if (e.data === 'refreshFromCloud') {
    if (isEditing) {
      console.log('编辑中，同步后局部刷新');
      setTimeout(() => {
        partialRefreshRecords();
      }, 300);
    } else {
      partialRefreshRecords();
    }
  }
});

// 只刷新记录列表，不整页刷新
function partialRefreshRecords() {
  console.log('执行局部刷新');
  renderRecords();   // 只重绘列表
  renderStarPage();  // 同步刷新收藏页
  renderTrashPage(); // 同步刷新回收站
}
// ==========================================================

const STORAGE_KEY = 'jichibang_records';
const PEOPLE_KEY = 'cfg_people';
const LEADER_KEY = 'cfg_leader';
const STATUS_KEY = 'cfg_status4';
const DEFAULT_TRASH_KEY = 'jichibang_trash';
const BENDIBANBEN_KEY = 'bendibanben';
const week = ["日","一","二","三","四","五","六"];

// 获取当前用户的回收站键
function getCurrentTrashKey() {
  const yonghuID = localStorage.getItem('yonghuID');
  if (yonghuID) {
    return `${yonghuID}_${DEFAULT_TRASH_KEY}`;
  }
  return DEFAULT_TRASH_KEY;
}

let currentEditIndex = -1;
let currentRecordPeopleMap = {};
let currentNoteIndex = -1;
let showLimit = 5;

function incLocalVersion() {
  let v = parseInt(localStorage.getItem(BENDIBANBEN_KEY) || 0);
  v++;
  localStorage.setItem(BENDIBANBEN_KEY, v);
}

function generateUniqueId(){
  const d = new Date();
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const H = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  const time14 = Y+M+D+H+m;
  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
  const r1 = letters[Math.floor(Math.random()*letters.length)];
  const r2 = letters[Math.floor(Math.random()*letters.length)];
  return time14+r1+r2;
}

function showModal(id){
  hideAllModals();
  document.getElementById(id).style.display = "flex";
  isEditing = true;
}
function hideAllModals(){
  document.querySelectorAll('.modal').forEach(m=>{
    m.style.display = "none";
  });
  isEditing = false;
}

function closePreview(){ hideAllModals() }
function closeEditPeopleModal(){
  hideAllModals();
  currentEditIndex=-1;
  currentRecordPeopleMap = {};
}
function closeNoteModal(){
  hideAllModals();
  currentNoteIndex=-1;
}
function closePeopleModal(){ hideAllModals() }
function closeStatusModal(){ hideAllModals() }
function closePasswordModal(){ hideAllModals() }

// ====================== 同步窗口拖动 ======================
let isSyncDragging = false;
let syncStartX, syncStartY, syncX, syncY;
document.getElementById('syncHeader').addEventListener('mousedown', startSyncDrag);
document.addEventListener('mousemove', doSyncDrag);
document.addEventListener('mouseup', stopSyncDrag);

function startSyncDrag(e) {
  isSyncDragging = true;
  const c = document.getElementById('syncIframeContainer');
  syncStartX = e.clientX;
  syncStartY = e.clientY;
  // 直接使用offsetLeft和offsetTop，避免style.left为NaN时的问题
  syncX = c.offsetLeft;
  syncY = c.offsetTop;
  document.body.style.userSelect = 'none';
}
function doSyncDrag(e) {
  if (!isSyncDragging) return;
  const c = document.getElementById('syncIframeContainer');
  const dx = e.clientX - syncStartX;
  const dy = e.clientY - syncStartY;
  c.style.left = syncX + dx + 'px';
  c.style.top = syncY + dy + 'px';
  // 移除transform设置，避免跳动
}
function stopSyncDrag() {
  isSyncDragging = false;
  document.body.style.userSelect = 'auto';
}

function hideSyncIframe() {
  document.getElementById('syncIframeContainer').style.display = 'none';
}

// 快速同步函数
function doQuickSync() {
  // 检查用户是否登录

let logoutInterval = null;
let isLoggingOut = false;

function logout() {
  // 防止重复点击
  if (isLoggingOut) return;
  
  // 检查本地版本和云端版本
  const localVersion = parseInt(localStorage.getItem('bendibanben') || 0);
  const cloudVersion = parseInt(localStorage.getItem('bediyunbanben') || 0);
  
  console.log(`退出登录检查: 本地版本=${localVersion}, 云端版本=${cloudVersion}`);
  
  // 如果bendibanben和bendiyunbanben都是0，直接退出，不删除本地痕迹
  if (localVersion === 0 && cloudVersion === 0) {
    console.log('bendibanben和bendiyunbanben都是0，直接退出，不删除本地痕迹');
    // 只清理用户标识，不删除其他本地痕迹
    localStorage.removeItem('yonghuID');
    localStorage.removeItem('lastyonghuID');
    // 关闭登录菜单
    document.getElementById('loginMenu').style.display = 'none';
    // 更新登录状态
    updateLoginStatus();
    // 刷新页面
    location.reload();
    return;
  }
  
  // 如果版本已经一致，直接退出，不显示弹窗
  if (localVersion === cloudVersion) {
    console.log('版本已经一致，直接退出');
    performLogout(localVersion);
    return;
  }
  
  isLoggingOut = true;
  
  // 冻结退出登录按钮
  const logoutBtn = document.querySelector('#loginMenu div[onclick="logout()"]');
  if (logoutBtn) {
    logoutBtn.style.opacity = '0.5';
    logoutBtn.style.cursor = 'not-allowed';
    logoutBtn.onclick = null;
  }
  
  // 显示退出登录弹窗
  document.getElementById('logoutModal').style.display = 'flex';
  
  // 开始加载动画
  let dotCount = 0;
  const loadingElement = document.getElementById('logoutLoading');
  
  const loadingInterval = setInterval(() => {
    dotCount = (dotCount + 1) % 4;
    loadingElement.textContent = '同步中' + '.'.repeat(dotCount);
  }, 500);
  
  // 显示同步窗口（包含tongbu.html）
  document.getElementById('syncIframeContainer').style.display = 'block';
  
  // 从tongbu.html iframe调用同步
  const syncIframe = document.getElementById('syncIframe');
  try {
    // 尝试调用tongbu.html中的doSync方法
    syncIframe.contentWindow.doSync();
    console.log('已调用tongbu.html的doSync方法');
  } catch (e) {
    console.error('调用tongbu.html的doSync失败:', e);
    try {
      // 尝试发送消息触发同步
      syncIframe.contentWindow.postMessage('triggerSync', '*');
      console.log('已向tongbu.html发送同步请求');
    } catch (e2) {
      console.error('向tongbu.html发送同步请求失败:', e2);
    }
  }
  
  // 开始检查同步状态
  let checkCount = 0;
  const maxChecks = 20; // 最多检查20次（10秒）
  
  let lastLocalVersion = localVersion;
  let lastCloudVersion = cloudVersion;
  
  logoutInterval = setInterval(() => {
    checkCount++;
    
    // 检查本地版本和云端版本
    const updatedLocalVersion = parseInt(localStorage.getItem('bendibanben') || 0);
    const updatedCloudVersion = parseInt(localStorage.getItem('bediyunbanben') || 0);
    
    console.log(`检查同步状态: 本地版本=${updatedLocalVersion}, 云端版本=${updatedCloudVersion}, 检查次数=${checkCount}`);
    
    if (updatedLocalVersion === updatedCloudVersion) {
      // 版本一致，执行退出
      clearInterval(logoutInterval);
      clearInterval(loadingInterval);
      document.getElementById('logoutMessage').textContent = '同步完成，准备退出...';
      document.getElementById('logoutLoading').textContent = '同步成功';
      document.getElementById('logoutCancelBtn').style.display = 'none';
      document.getElementById('logoutConfirmBtn').style.display = 'inline-block';
      console.log('版本一致，准备退出');

      // 超过最大检查次数，显示重试和强制退出选项
      clearInterval(logoutInterval);
      clearInterval(loadingInterval);
      document.getElementById('logoutMessage').textContent = '同步失败，是否再次同步或强制退出？';

}

// 获取所有相关的回收站键
function getAllTrashKeys() {
  const keys = [];
  // 添加默认回收站
  keys.push(DEFAULT_TRASH_KEY);
  // 添加当前用户的回收站
  const yonghuID = localStorage.getItem('yonghuID');
  if (yonghuID) {
    keys.push(`${yonghuID}_${DEFAULT_TRASH_KEY}`);
  }
  return keys;
}

// 获取合并后的回收站数据
function getCombinedTrash() {
  const allTrash = [];
  const keys = getAllTrashKeys();
  
  keys.forEach(key => {
    try {
      const trash = JSON.parse(localStorage.getItem(key)) || [];
      allTrash.push(...trash);
    } catch (e) {
      console.log(`读取回收站 ${key} 失败:`, e);
    }
  });
  
  // 按时间排序，最新的在前
  allTrash.sort((a, b) => {
    return new Date(b.time) - new Date(a.time);
  });
  
  return allTrash;
}

function now(){
  const d = new Date();
  const wd = week[d.getDay()];
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const date = Y + M + D;
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return date + ' ' + hh + ':' + mm + wd;
}

  localStorage.setItem(STORAGE_KEY,JSON.stringify(r));
}

function generate(){
  const custom=document.getElementById("customInput").value.trim();
  const leader=document.getElementById("leaderSelect").value;
  const a=document.getElementById("lv1").value;const b=document.getElementById("lv2").value;const c=document.getElementById("lv3").value;const d=document.getElementById("lv4").value;
  const selected=[...document.querySelectorAll(".item.active")].map(x=>x.textContent);
  if(selected.length===0){alert("请选择人物");return;}
  const levelParts=[a,b,c,d].filter(Boolean);
  const hasTitle=custom!==''||levelParts.length>0;
  if(!hasTitle){alert("请输入标题或选择状态");return;}
  let status=custom?custom:levelParts.join(" - ");
  const list=getRecords();
  list.unshift({
    id:generateUniqueId(),
    time:now(),
    status:status,
    people:selected.map(name=>({name,active:true,type:"normal"})),
    leader:leader,
    note:"",
    star:false
  });
  setRecords(list);
  document.getElementById("customInput").value="";
  document.getElementById("leaderSelect").selectedIndex=0;
  clearSelected();loadLv1();
  partialRefreshRecords(); // 局部刷新
  alert("已生成");
}

function clearSelected(){document.querySelectorAll(".item.active").forEach(x=>x.classList.remove("active"))}

function showMore(){
  showLimit+=5;
  partialRefreshRecords();
}

function copyRecord(rec){
  const activeNames=rec.people.filter(o=>o.active).map(o=>o.name);
  if(activeNames.length===0){alert("暂无激活人员");return;}
  const copyText=`${activeNames.join("、")}，${rec.status}${rec.leader?" 负责人："+rec.leader:""}`;
  navigator.clipboard.writeText(copyText);
  document.getElementById("previewText").innerText=copyText;
  showModal('previewModal');
}

function openEditPeopleModal(index){
  currentEditIndex=index;
  const records=getRecords();const target=records[index];
  currentRecordPeopleMap={};
  target.people.forEach(obj=>{currentRecordPeopleMap[obj.name]=obj.active});
  const grid=document.getElementById("editPeopleGrid");grid.innerHTML="";
  getPeople().forEach(name=>{
    const item=document.createElement("div");item.className="item";
    if(currentRecordPeopleMap.hasOwnProperty(name))item.classList.add("active");
    item.textContent=name;item.onclick=()=>item.classList.toggle("active");grid.appendChild(item);
  });
  document.getElementById("editStatus").value=target.status||"";
  const leaderSel=document.getElementById("editLeaderSelect");leaderSel.innerHTML="";
  const emptyOpt=document.createElement("option");emptyOpt.value="";emptyOpt.textContent="不选负责人";
  leaderSel.appendChild(emptyOpt);
  getLeaders().forEach(name=>{
    const o=document.createElement("option");o.value=name;o.textContent=name;
    if(name===target.leader)o.selected=true;leaderSel.appendChild(o);
  });
  showModal('editPeopleModal');
}

function saveEditedPeople(){
  if(currentEditIndex===-1)return;
  const editStatus=document.getElementById("editStatus").value.trim();
  if(!editStatus){alert("标题不能为空");return;}
  const records=getRecords();const target=records[currentEditIndex];
  const selectedNames=[...document.querySelectorAll("#editPeopleGrid .item.active")].map(x=>x.textContent.trim()).filter(Boolean);
  target.people=selectedNames.map(name=>({name:name,active:currentRecordPeopleMap[name]??true,type:"normal"}));
  target.status=editStatus;
  target.leader=document.getElementById("editLeaderSelect").value;
  setRecords(records);
  closeEditPeopleModal();
  partialRefreshRecords();
  alert("修改成功");
}

function openNoteModal(index){
  currentNoteIndex=index;
  const records=getRecords();
  document.getElementById("noteInput").value=records[index].note||"";
  showModal('noteModal');
}
function saveNote(){
  if(currentNoteIndex===-1)return;
  const records=getRecords();
  records[currentNoteIndex].note=document.getElementById("noteInput").value.trim();
  setRecords(records);
  closeNoteModal();

function toggleStar(index){

function clearAllRecords(){
  if(!confirm("确定清空全部记录？"))return;
  const records=getRecords();addManyToTrash(records);
  // 只有登录用户才执行bendibanben+1
  if(localStorage.getItem('yonghuID')){
    incLocalVersion();
  }
  localStorage.removeItem(STORAGE_KEY);
  partialRefreshRecords();
}
function clearStarRecords(){
  if(!confirm("确定清空收藏？"))return;
  const records=getRecords();const starItems=records.filter(r=>r.star);
  addManyToTrash(starItems);records.forEach(r=>r.star=false);
  setRecords(records);
  partialRefreshRecords();
}
function clearTrash(){
  if(!confirm("确定清空回收站？"))return;
  // 清空当前用户的回收站
  localStorage.removeItem(getCurrentTrashKey());
  partialRefreshRecords();
}

// 清空所有用户的回收站（谨慎使用）
function clearAllTrash() {
  if(!confirm("确定清空所有回收站？"))return;
  const keys = getAllTrashKeys();
  keys.forEach(key => {
    localStorage.removeItem(key);
  });
  partialRefreshRecords();
}

function restoreFromTrash(idx){
  const trash=getCombinedTrash();const item=trash[idx];
  if(!item)return;
  const records=getRecords();
  const hasSameId=records.some(r=>r.id&&item.id&&r.id===item.id);
  if(hasSameId){alert("ID重复，无法撤回");return;}
  
  // 从所有回收站中删除该项目
  const keys = getAllTrashKeys();
  keys.forEach(key => {
    try {
      const trashData = JSON.parse(localStorage.getItem(key)) || [];
      const updatedTrash = trashData.filter(t => t.id !== item.id);
      localStorage.setItem(key, JSON.stringify(updatedTrash));
    } catch (e) {
      console.log(`更新回收站 ${key} 失败:`, e);
    }
  });
  
  records.unshift(item);
  setRecords(records);
  partialRefreshRecords();
}

function deleteFromTrash(idx){
  if(!confirm("确定彻底删除？"))return;
  const trash=getCombinedTrash();const item=trash[idx];
  if(!item)return;
  
  // 从所有回收站中删除该项目
  const keys = getAllTrashKeys();
  keys.forEach(key => {
    try {
      const trashData = JSON.parse(localStorage.getItem(key)) || [];
      const updatedTrash = trashData.filter(t => t.id !== item.id);
      localStorage.setItem(key, JSON.stringify(updatedTrash));
    } catch (e) {
      console.log(`更新回收站 ${key} 失败:`, e);
    }
  });
  
  partialRefreshRecords();
}

function makeRecordItem(realIndex){
  const records=getRecords();const rec=records[realIndex];
  const card=document.createElement("div");card.className="record-card";

  const header=document.createElement("div");header.className="record-header";

  const starBtn=document.createElement("div");
  starBtn.className="record-star";
  starBtn.textContent=rec.star?"★":"☆";
  starBtn.onclick=()=>toggleStar(realIndex);
  header.appendChild(starBtn);

  const titleBox=document.createElement("div");
  titleBox.className="record-title";
  titleBox.textContent=rec.status;
  header.appendChild(titleBox);

  const timeBox=document.createElement("div");
  timeBox.className="record-time";
  timeBox.textContent=rec.time;
  header.appendChild(timeBox);

  card.appendChild(header);

  const pw=document.createElement("div");pw.className="record-people";
  rec.people.forEach((obj,i)=>{
    const s=document.createElement("span");s.className="pill "+(obj.active?"active":"inactive");s.textContent=obj.name;
    s.onclick=()=>{
      if(!confirm("确定切换状态？"))return;
      rec.people[i].active=!rec.people[i].active;
      const all=getRecords();all[realIndex].people=rec.people;setRecords(all);partialRefreshRecords();
    };
    pw.appendChild(s);
  });
  if(rec.leader){
    const sp=document.createElement("span");sp.className="pill leader";sp.textContent=rec.leader;
    pw.appendChild(sp);
  }
  card.appendChild(pw);

  if(rec.note){
    const noteDiv=document.createElement("div");
    noteDiv.className="record-note";
    noteDiv.textContent=rec.note;
    card.appendChild(noteDiv);
  }

  const btns=document.createElement("div");btns.className="record-btns";
  const editBtn=document.createElement("button");editBtn.className="gray";editBtn.textContent="编辑";
  editBtn.onclick=()=>openEditPeopleModal(realIndex);
  const cpBtn=document.createElement("button");cpBtn.className="gray";cpBtn.textContent="复制";
  cpBtn.onclick=()=>copyRecord(rec);
  const noteBtn=document.createElement("button");noteBtn.className="gray";noteBtn.textContent="备注";
  noteBtn.onclick=()=>openNoteModal(realIndex);
  const delBtn=document.createElement("button");delBtn.className="red";delBtn.textContent="删除";
  delBtn.onclick=()=>{
    if(!confirm("确定删除？"))return;
    const data=getRecords();const delItem=data.splice(realIndex,1)[0];
    addToTrash(delItem);setRecords(data);partialRefreshRecords();
  };
  btns.append(editBtn,cpBtn,noteBtn,delBtn);
  card.appendChild(btns);
  return card;
}

function makeTrashItem(idx){
  const trash=getCombinedTrash();const rec=trash[idx];
  const card=document.createElement("div");card.className="record-card";

  const header=document.createElement("div");header.className="record-header";

  const starBtn=document.createElement("div");
  starBtn.className="record-star";
  starBtn.textContent=rec.star?"★":"☆";
  header.appendChild(starBtn);

  const titleBox=document.createElement("div");
  titleBox.className="record-title";
  titleBox.textContent=rec.status;
  header.appendChild(titleBox);

  const timeBox=document.createElement("div");
  timeBox.className="record-time";
  timeBox.textContent=rec.time;
  header.appendChild(timeBox);

  card.appendChild(header);

  const pw=document.createElement("div");pw.className="record-people";
  rec.people.forEach(obj=>{
    const s=document.createElement("span");s.className="pill "+(obj.active?"active":"inactive");s.textContent=obj.name;
    pw.appendChild(s);
  });
  if(rec.leader){
    const sp=document.createElement("span");sp.className="pill leader";sp.textContent=rec.leader;
    pw.appendChild(sp);
  }
  card.appendChild(pw);

  if(rec.note){
    const noteDiv=document.createElement("div");
    noteDiv.className="record-note";
    noteDiv.textContent=rec.note;
    card.appendChild(noteDiv);
  }

  const btns=document.createElement("div");btns.className="record-btns";
  const restoreBtn=document.createElement("button");restoreBtn.className="red";restoreBtn.textContent="撤回";
  restoreBtn.onclick=()=>restoreFromTrash(idx);
  const delBtn=document.createElement("button");delBtn.className="red";delBtn.textContent="彻底删除";
  delBtn.onclick=()=>deleteFromTrash(idx);
  btns.append(restoreBtn,delBtn);
  card.appendChild(btns);
  return card;
}

function renderRecords(){
  const list=getRecords();
  const r1=document.getElementById("recentRecords");const r2=document.getElementById("allRecords");
  r1.innerHTML="";r2.innerHTML="";
  list.slice(0,showLimit).forEach((_,i)=>r1.appendChild(makeRecordItem(i)));
  list.forEach((_,i)=>r2.appendChild(makeRecordItem(i)));
}

function renderStarPage(){
  const list=getRecords();const box=document.getElementById("starRecords");box.innerHTML="";
  list.forEach((item,idx)=>{if(item.star)box.appendChild(makeRecordItem(idx))});
}

function renderTrashPage(){
  const trash=getCombinedTrash();const box=document.getElementById("trashRecords");box.innerHTML="";
  trash.forEach((_,idx)=>box.appendChild(makeTrashItem(idx)));
}

  // 更新登录状态
  updateLoginStatus();
  // 绑定登录点击事件
  document.getElementById('loginText').addEventListener('click', handleLoginClick);
}

renderAll();
