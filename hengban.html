<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速记事（布局优化版）</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:10px;background:#f6f6f6;font-family:system-ui,sans-serif;width:1440px;max-width:95vw;margin:0;}

.page-title{
  text-align:center;
  font-weight:bold;
  font-size:18px;
  color:#333;
  margin:8px 0 12px;
}

.top-container {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  height: auto;
}

.student-area {
  flex: 1;
  background: #fff;
  border-radius: 8px;
  border: 1px solid #ddd;
  padding: 10px;
  overflow-y: auto;
}
.student-grid {
  display: grid;
  grid-template-columns: repeat(8,1fr);
  gap: 6px;
}
.student-item{
  padding:10px 6px;
  text-align:center;
  border:1px solid #ccc;
  border-radius:6px;
  background:#fff;
  font-size:14px;
  cursor:pointer;
}
.student-item.active{
  background:#4CAF50;
  color:#fff;
}

/* 功能区：6列 → 现在扩展为 7列 */
.func-area {
  width:600px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(3, auto);
  gap:8px;
}
.func-area button,
.func-area input,
.func-area select {
  padding:10px 6px;
  font-size:14px;
  border-radius:6px;
  border:1px solid #ccc;
}
.func-area button {
  border:none;
  color:#fff;
  white-space:nowrap;
}

/* 空提示格子 */
.placeholder-tip{
  display:flex;align-items:center;justify-content:center;
  border:1px dashed #ccc;border-radius:6px;
  font-size:14px;color:#666;background:#fafafa;
}

/* 便签容器：5列，宽度与功能区完全对齐 */
.notes-container {
  width: 105%;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap:1px;
  margin-bottom:12px;
}

.note-card{
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
  overflow:hidden;
  height: 190px;
}

.note-header{
  position:relative;
  height: 48px;
}
.note-star{
  position:absolute;
  left:0;
  top:0;
  font-size:16px;
  z-index:2;
}
.note-title{
  font-size:15px;
  font-weight:bold;
  color:#2196F3;
  padding-left:24px;
  padding-right:60px;
  line-height:1.4;
  height:48px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.note-time{
  position:absolute;
  right:0;
  bottom:0;
  font-size:13px;
  background:#eee;
  padding:3px 8px;
  border-radius:6px;
  white-space:nowrap;
}

.note-people{
  flex-grow:1;
  overflow-y:auto;
  font-size:13px;
}
.note-note{
  background:#f9f9f9;
  padding:4px 6px;
  border-radius:4px;
  font-size:13px;
}
.note-btns{
  display:flex;gap:4px;margin-top:auto;
}
.note-btns button{
  flex:1;padding:4px;font-size:13px;
}

.more-btn{
  width:105%;padding:12px;font-size:15px;background:#777;color:#fff;border:none;border-radius:6px;cursor:pointer;
}

button{background:#2196F3;color:white;border:none;cursor:pointer;border-radius:6px}
button.gray{background:#777}
button.red{background:#f44}
button.star{background:#FFB800;color:#222;font-weight:bold}
button.future{background:#999;color:white}

.pill{display:inline-block;padding:4px 6px;margin:2px;border-radius:4px;border:1px solid #ccc;font-size:13px}
.pill.active{background:#4CAF50;color:#fff}
.pill.inactive{background:#fff;color:#000}
.pill.leader{background:#fff;color:#2196F3;border:1px solid #2196F3}

.all-page,.star-page,.trash-page{display:none}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);
  display:none;justify-content:center;align-items:center;padding:10px;z-index:9999;
}
.modal-content{
  background:#fff;border-radius:12px;width:100%;max-width:420px;padding:20px;
}
.modal-title{font-weight:bold;margin-bottom:12px;font-size:16px}
.modal-textarea{width:100%;height:180px;padding:10px;border-radius:6px;border:1px solid #ccc;margin-bottom:8px}

#previewModal{z-index:9999;}
#editPeopleModal{z-index:9998;}
#editPeopleGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:15px 0;max-height:300px;overflow-y:auto;padding:10px;border:1px solid #eee;border-radius:8px;}
#editPeopleGrid .item{font-size:14px;padding:10px 4px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;text-align:center;}
#editPeopleGrid .item:hover{background:#f5f5f5;}
#editPeopleGrid .item.active{background:#4CAF50;color:#fff;border-color:#4CAF50;}
#noteModal{z-index:9997;}
#passwordModal{z-index:10000;}
.password-box{background:#fff;padding:24px;border-radius:12px;width:320px;text-align:center;}
.password-box input{margin:12px 0;text-align:center;font-size:16px;letter-spacing:4px;}

#adminIframeContainer{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:960px;height:660px;background:#fff;border-radius:16px;box-shadow:0 0 24px rgba(0,0,0,0.2);
  z-index:9999;display:none;
}
#iframeHeader{
  height:42px;background:#9C27B0;color:#fff;padding:10px 16px;
  border-radius:16px 16px 0 0;cursor:move;
  display:flex;justify-content:space-between;align-items:center;
}
#closeIframeBtn{background:#fff;color:#9C27B0;border:none;border-radius:6px;padding:4px 10px;font-size:14px;cursor:pointer;}
#adminIframe{width:100%;height:calc(100% - 42px);border:none;}
</style>

<body>

    <div id="loginHeader" style="height:42px;background:#1890ff;color:#fff;padding:10px 16px;border-radius:12px 12px 0 0;cursor:move;display:flex;justify-content:space-between;align-items:center;">

  <!-- 同步窗口：打开即加载 tongbu.html -->
  <div id="syncIframeContainer" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:#fff;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,0.2);z-index:9999;display:none;">
    <div id="syncHeader" style="height:42px;background:#1890ff;color:#fff;padding:10px 16px;border-radius:12px 12px 0 0;cursor:move;display:flex;justify-content:space-between;align-items:center;">
      同步服务

</div>

<script>

// 接收同步通知
window.addEventListener('message', function(e) {
  if (e.data === 'refreshFromCloud') {
    if (isEditing) {
      console.log('编辑中，同步后局部刷新');
      setTimeout(() => {
        partialRefreshRecords();
      }, 300);
    } else {
      partialRefreshRecords();
    }
  }
});

// 接收登录成功的通知
window.addEventListener('message', function(e) {
  if (e.data === 'loginSuccess') {
    hideLoginIframe();
    location.reload(); // 登录成功后刷新页面
  }
});

// 只刷新记录列表，不整页刷新
function partialRefreshRecords() {
  console.log('执行局部刷新');
  renderNotes();   // 只重绘列表
  renderAllNotes();  // 同步刷新全部页
  renderStarNotes();  // 同步刷新收藏页
  renderTrashNotes(); // 同步刷新回收站
}

const STORAGE_KEY = 'jichibang_records';
const PEOPLE_KEY = 'cfg_people';
const LEADER_KEY = 'cfg_leader';
const STATUS_KEY = 'cfg_status4';
const DEFAULT_TRASH_KEY = 'jichibang_trash';
const BENDIBANBEN_KEY = 'bendibanben';
const week = ["日","一","二","三","四","五","六"];

let currentEditIndex = -1;
let currentRecordPeopleMap = {};
let currentNoteIndex = -1;
let showLimit = 20;
const loadStep = 20;
let isEditing = false;

// 登录相关变量
let logoutInterval = null;
let isLoggingOut = false;

// 同步窗口拖动
let isSyncDragging = false;
let syncStartX, syncStartY, syncX, syncY;

// 登录窗口拖动
let isLoginDragging = false;
let loginStartX, loginStartY, loginX, loginY;

function generateUniqueId(){
  const d = new Date();
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const H = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return Y+M+D+H+m+Math.random().toString(36).substr(2,4);
}

function now(){
  const d = new Date();
  const wd = week[d.getDay()];
  const Y = d.getFullYear();
  const M = String(d.getMonth()+1).padStart(2,'0');
  const D = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return Y+M+D+' '+hh+':'+mm+wd;
}

function showModal(id){
  hideAllModals();
  document.getElementById(id).style.display="flex";
}
function hideAllModals(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display="none");
}
function closePreview(){hideAllModals()}
function closeEditPeopleModal(){hideAllModals();currentEditIndex=-1;currentRecordPeopleMap={}}
function closeNoteModal(){hideAllModals();currentNoteIndex=-1}
function closePeopleModal(){hideAllModals()}
function closeStatusModal(){hideAllModals()}
function closePasswordModal(){hideAllModals()}

// ====================== 原有后台拖动 ======================
let isDragging = false;
let dragStartX,dragStartY,iframeX,iframeY;
document.getElementById('iframeHeader').addEventListener('mousedown',startDrag);
document.addEventListener('mousemove',drag);
document.addEventListener('mouseup',stopDrag);

function startDrag(e){
  isDragging = true;
  const c = document.getElementById('adminIframeContainer');
  dragStartX = e.clientX; dragStartY = e.clientY;
  // 直接使用offsetLeft和offsetTop，避免style.left为NaN时的问题
  iframeX = c.offsetLeft;
  iframeY = c.offsetTop;
  document.body.style.userSelect = 'none';
}
function drag(e){
  if(!isDragging) return;
  const c = document.getElementById('adminIframeContainer');
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  c.style.left = iframeX+dx+'px';
  c.style.top = iframeY+dy+'px';
  // 移除transform设置，避免跳动
}
function stopDrag(){
  isDragging = false;
  document.body.style.userSelect = 'auto';
}

// ====================== 同步窗口拖动 ======================
document.getElementById('syncHeader').addEventListener('mousedown', startSyncDrag);
document.addEventListener('mousemove', doSyncDrag);
document.addEventListener('mouseup', stopSyncDrag);

function startSyncDrag(e) {
  isSyncDragging = true;
  const c = document.getElementById('syncIframeContainer');
  syncStartX = e.clientX;
  syncStartY = e.clientY;
  // 直接使用offsetLeft和offsetTop，避免style.left为NaN时的问题
  syncX = c.offsetLeft;
  syncY = c.offsetTop;
  document.body.style.userSelect = 'none';
}
function doSyncDrag(e) {
  if (!isSyncDragging) return;
  const c = document.getElementById('syncIframeContainer');
  const dx = e.clientX - syncStartX;
  const dy = e.clientY - syncStartY;
  c.style.left = syncX + dx + 'px';
  c.style.top = syncY + dy + 'px';
  // 移除transform设置，避免跳动
}
function stopSyncDrag() {
  isSyncDragging = false;
  document.body.style.userSelect = 'auto';
}

// ====================== 登录窗口拖动 ======================
document.getElementById('loginHeader').addEventListener('mousedown', startLoginDrag);
document.addEventListener('mousemove', doLoginDrag);
document.addEventListener('mouseup', stopLoginDrag);

function startLoginDrag(e) {
  isLoginDragging = true;
  const c = document.getElementById('loginIframeContainer');
  loginStartX = e.clientX;
  loginStartY = e.clientY;
  // 直接使用offsetLeft和offsetTop，避免style.left为NaN时的问题
  loginX = c.offsetLeft;
  loginY = c.offsetTop;
  document.body.style.userSelect = 'none';
}
function doLoginDrag(e) {
  if (!isLoginDragging) return;
  const c = document.getElementById('loginIframeContainer');
  const dx = e.clientX - loginStartX;
  const dy = e.clientY - loginStartY;
  c.style.left = loginX + dx + 'px';
  c.style.top = loginY + dy + 'px';
  // 移除transform设置，避免跳动
}
function stopLoginDrag() {
  isLoginDragging = false;
  document.body.style.userSelect = 'auto';
}

function showAdminIframe(){document.getElementById('adminIframeContainer').style.display='block'}
function hideAdminIframe(){document.getElementById('adminIframeContainer').style.display='none';location.reload();}
function openPasswordModal(){showModal('passwordModal');document.getElementById('adminPassword').value='';}
function checkAdminPassword(){
  if(document.getElementById('adminPassword').value==='666666'){hideAllModals();showAdminIframe();}else{alert('密码错误');}

// 退出登录
function logout() {
  // 防止重复点击
  if (isLoggingOut) return;
  
  // 检查本地版本和云端版本
  const localVersion = parseInt(localStorage.getItem('bendibanben') || 0);
  const cloudVersion = parseInt(localStorage.getItem('bediyunbanben') || 0);
  
  console.log(`退出登录检查: 本地版本=${localVersion}, 云端版本=${cloudVersion}`);
  
  // 如果bendibanben和bendiyunbanben都是0，直接退出，不删除本地痕迹
  if (localVersion === 0 && cloudVersion === 0) {
    console.log('bendibanben和bendiyunbanben都是0，直接退出，不删除本地痕迹');
    // 只清理用户标识，不删除其他本地痕迹
    localStorage.removeItem('yonghuID');
    localStorage.removeItem('lastyonghuID');
    // 关闭登录菜单
    document.getElementById('loginMenu').style.display = 'none';
    // 更新登录状态
    updateLoginStatus();
    // 刷新页面
    location.reload();
    return;
  }
  
  // 如果版本已经一致，直接退出，不显示弹窗
  if (localVersion === cloudVersion) {
    console.log('版本已经一致，直接退出');
    performLogout(localVersion);
    return;
  }
  
  isLoggingOut = true;
  
  // 冻结退出登录按钮
  const logoutBtn = document.querySelector('#loginMenu div[onclick="logout()"]');
  if (logoutBtn) {
    logoutBtn.style.opacity = '0.5';
    logoutBtn.style.cursor = 'not-allowed';
    logoutBtn.onclick = null;
  }
  
  // 显示退出登录弹窗
  document.getElementById('logoutModal').style.display = 'flex';
  document.getElementById('logoutMessage').textContent = '正在同步数据，请稍等...';
  document.getElementById('logoutLoading').textContent = '同步中';
  // 隐藏所有按钮
  document.getElementById('logoutCancelBtn').style.display = 'none';
  document.getElementById('logoutRetryBtn').style.display = 'none';
  document.getElementById('logoutForceBtn').style.display = 'none';
  document.getElementById('logoutConfirmBtn').style.display = 'none';
  
  // 开始加载动画
  let dotCount = 0;
  const loadingElement = document.getElementById('logoutLoading');
  const loadingInterval = setInterval(() => {
    dotCount = (dotCount + 1) % 4;
    loadingElement.textContent = '同步中' + '.'.repeat(dotCount);
  }, 500);
  
  // 显示同步窗口（包含tongbu.html）
  document.getElementById('syncIframeContainer').style.display = 'block';
  
  // 从tongbu.html iframe调用同步
  const syncIframe = document.getElementById('syncIframe');
  try {
    // 尝试调用tongbu.html中的doSync方法
    syncIframe.contentWindow.doSync();
    console.log('已调用tongbu.html的doSync方法');
  } catch (e) {
    console.error('调用tongbu.html的doSync失败:', e);
    try {
      // 尝试发送消息触发同步
      syncIframe.contentWindow.postMessage('triggerSync', '*');
      console.log('已向tongbu.html发送同步请求');
    } catch (e2) {
      console.error('向tongbu.html发送同步请求失败:', e2);
    }
  }
  
  // 开始检查同步状态
  let checkCount = 0;
  const maxChecks = 20; // 最多检查20次（10秒）
  
  let lastLocalVersion = localVersion;
  let lastCloudVersion = cloudVersion;
  
  logoutInterval = setInterval(() => {
    checkCount++;
    
    // 检查本地版本和云端版本
    const updatedLocalVersion = parseInt(localStorage.getItem('bendibanben') || 0);
    const updatedCloudVersion = parseInt(localStorage.getItem('bediyunbanben') || 0);
    
    console.log(`检查同步状态: 本地版本=${updatedLocalVersion}, 云端版本=${updatedCloudVersion}, 检查次数=${checkCount}`);
    
    if (updatedLocalVersion === updatedCloudVersion) {
      // 版本一致，执行退出
      clearInterval(logoutInterval);
      clearInterval(loadingInterval);
      document.getElementById('logoutMessage').textContent = '同步完成，准备退出...';
      document.getElementById('logoutLoading').textContent = '同步成功';
      document.getElementById('logoutCancelBtn').style.display = 'none';
      document.getElementById('logoutConfirmBtn').style.display = 'inline-block';
      console.log('版本一致，准备退出');
    } else if (checkCount >= maxChecks) {
      // 超过最大检查次数，显示重试和强制退出选项
      clearInterval(logoutInterval);
      clearInterval(loadingInterval);
      document.getElementById('logoutMessage').textContent = '同步失败，是否再次同步或强制退出？';
      document.getElementById('logoutLoading').textContent = '同步失败';
      // 显示再次同步和强制退出按钮
      document.getElementById('logoutCancelBtn').style.display = 'inline-block';
      document.getElementById('logoutRetryBtn').style.display = 'inline-block';
      document.getElementById('logoutForceBtn').style.display = 'inline-block';
      document.getElementById('logoutConfirmBtn').style.display = 'none';
      console.log('同步失败，超过最大尝试次数');
    }
  }, 500); // 每0.5秒检查一次
}

function generate(){
  const txt=document.getElementById('customInput').value.trim();
  const lead=document.getElementById('leaderSelect').value;
  const a=document.getElementById('lv1').value,b=document.getElementById('lv2').value,c=document.getElementById('lv3').value,d=document.getElementById('lv4').value;
  const sel=[...document.querySelectorAll('.student-item.active')].map(i=>i.textContent);
  if(!sel.length){alert('请选择人物');return;}
  const parts=[a,b,c,d].filter(Boolean);
  if(!txt&&!parts.length){alert('请输入标题或选择状态');return;}
  const title=txt||parts.join(' - ');
  const r=getRecords();
  r.unshift({id:generateUniqueId(),time:now(),status:title,people:sel.map(n=>({name:n,active:true})),leader:lead,note:'',star:false});
  setRecords(r);
  document.getElementById('customInput').value='';
  document.getElementById('leaderSelect').selectedIndex=0;
  clearSelected();loadLv1();renderNotes();alert('已生成');
}

  const s=`${ns.join('、')}，${r.status}${r.leader?' 负责人：'+r.leader:''}`;

}

function openNoteModal(i){currentNoteIndex=i;document.getElementById('noteInput').value=(getRecords()[i]||{}).note||'';showModal('noteModal');}
function saveNote(){if(currentNoteIndex===-1)return;const rs=getRecords();rs[currentNoteIndex].note=document.getElementById('noteInput').value.trim();setRecords(rs);closeNoteModal();renderNotes();renderStarNotes();}

function toggleStar(i){const rs=getRecords();rs[i].star=!rs[i].star;setRecords(rs);renderNotes();renderStarNotes();}

function showMainPage(){
  document.querySelector('.main-page').style.display='block';
  document.querySelector('.all-page').style.display='none';
  document.querySelector('.star-page').style.display='none';
  document.querySelector('.trash-page').style.display='none';
}
function showAllPage(){
  document.querySelector('.main-page').style.display='none';
  document.querySelector('.all-page').style.display='block';
  document.querySelector('.star-page').style.display='none';
  document.querySelector('.trash-page').style.display='none';
  renderAllNotes();
}
function showStarPage(){
  document.querySelector('.main-page').style.display='none';
  document.querySelector('.all-page').style.display='none';
  document.querySelector('.star-page').style.display='block';
  document.querySelector('.trash-page').style.display='none';
  renderStarNotes();
}
function showTrashPage(){
  document.querySelector('.main-page').style.display='none';
  document.querySelector('.all-page').style.display='none';
  document.querySelector('.star-page').style.display='none';
  document.querySelector('.trash-page').style.display='block';
  renderTrashNotes();
}

function clearAllRecords(){if(!confirm('确定清空全部记录？'))return;const r=getRecords();addManyToTrash(r);localStorage.removeItem(STORAGE_KEY);renderNotes();renderAllNotes();}
function clearStarRecords(){if(!confirm('确定清空收藏？'))return;const r=getRecords();r.forEach(i=>i.star=false);setRecords(r);renderNotes();renderStarNotes();}
function clearTrash(){if(!confirm('确定清空回收站？'))return;localStorage.removeItem(TRASH_KEY);renderTrashNotes();}

function restoreFromTrash(i){const t=getTrash();const it=t[i];if(!it)return;const r=getRecords();if(r.some(j=>j.id===it.id)){alert('已存在');return;}t.splice(i,1);setTrash(t);r.unshift(it);setRecords(r);renderTrashNotes();renderNotes();renderStarNotes();}
function deleteFromTrash(i){if(!confirm('确定删除？'))return;const t=getTrash();t.splice(i,1);setTrash(t);renderTrashNotes();}

function makeNoteCard(i,isTrash=false){
  const rs=isTrash?getTrash():getRecords();
  const r=rs[i];
  const c=document.createElement('div');c.className='note-card';
  const h=document.createElement('div');h.className='note-header';
  const star=document.createElement('div');star.className='note-star';star.textContent=r.star?'★':'☆';
  if(!isTrash)star.onclick=()=>toggleStar(i);
  const title=document.createElement('div');title.className='note-title';title.textContent=r.status;
  const time=document.createElement('div');time.className='note-time';time.textContent=r.time;
  h.append(star,title,time);c.appendChild(h);
  const p=document.createElement('div');p.className='note-people';
  r.people.forEach(o=>{
    const span=document.createElement('span');
    span.className='pill '+(o.active?'active':'inactive');
    span.textContent=o.name;
    if(!isTrash)span.onclick=()=>{
      if(confirm(`确定要${o.active ? '取消' : '激活'} ${o.name}吗？`)){
        o.active=!o.active;
        setRecords(rs);
        renderNotes();
        renderStarNotes();
        alert('状态已更新');
      }
    };
    p.appendChild(span);
  });
  if(r.leader){const sp=document.createElement('span');sp.className='pill leader';sp.textContent=r.leader;p.appendChild(sp);}
  c.appendChild(p);
  if(r.note){const n=document.createElement('div');n.className='note-note';n.textContent=r.note;c.appendChild(n);}
  const b=document.createElement('div');b.className='note-btns';
  if(isTrash){
    const res=document.createElement('button');res.className='red';res.textContent='撤回';res.onclick=()=>restoreFromTrash(i);
    const del=document.createElement('button');del.className='red';del.textContent='删除';del.onclick=()=>deleteFromTrash(i);
    b.append(res,del);
  }else{
    const e=document.createElement('button');e.className='gray';e.textContent='编辑';e.onclick=()=>openEditPeopleModal(i);
    const cp=document.createElement('button');cp.className='gray';cp.textContent='复制';cp.onclick=()=>copyRecord(r);
    const n=document.createElement('button');n.className='gray';n.textContent='备注';n.onclick=()=>openNoteModal(i);
    const d=document.createElement('button');d.className='red';d.textContent='删除';d.onclick=()=>{if(!confirm('确定删除？'))return;const all=getRecords();const item=all.splice(i,1)[0];addToTrash(item);setRecords(all);renderNotes();renderStarNotes();};
    b.append(e,cp,n,d);
  }
  c.appendChild(b);
  return c;
}

function renderNotes(){
  const b=document.getElementById('notesContainer');b.innerHTML='';
  getRecords().slice(0,showLimit).forEach((_,i)=>b.appendChild(makeNoteCard(i)));
}
function renderAllNotes(){
  const b=document.getElementById('allNotesContainer');b.innerHTML='';
  getRecords().forEach((_,i)=>b.appendChild(makeNoteCard(i)));
}
function renderStarNotes(){
  const b=document.getElementById('starNotesContainer');b.innerHTML='';
  getRecords().filter(r=>r.star).forEach((_,i)=>b.appendChild(makeNoteCard(i)));
}
function renderTrashNotes(){
  const b=document.getElementById('trashNotesContainer');b.innerHTML='';
  getTrash().forEach((_,i)=>b.appendChild(makeNoteCard(i,true)));
}

function renderAll(){
  renderStudents();
  loadLeaderSelect();
  loadLv1();
  renderNotes();
  // 更新登录状态
  updateLoginStatus();
  // 绑定登录点击事件
  document.getElementById('loginText').addEventListener('click', handleLoginClick);
  // 点击其他地方关闭登录菜单
  document.addEventListener('click', function(e) {
    const loginStatus = document.getElementById('loginStatus');
    const loginMenu = document.getElementById('loginMenu');
    if (!loginStatus.contains(e.target)) {
      loginMenu.style.display = 'none';
    }
  });
}

window.onload=renderAll;
</script>
</body>
