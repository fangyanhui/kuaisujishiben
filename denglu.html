<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>账号系统（标签切换版）</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,sans-serif}
    body{margin:0;padding:12px;background:#f7f8fa}
    .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
    .status{padding:8px 10px;border-radius:6px;margin:0 0 10px 0;font-size:14px}
    .status-success{background:#e8f5e9;color:#1b5e20}
    .status-error{background:#ffebee;color:#b71c1c}
    .status-info{background:#e3f2fd;color:#0d47a1}

    .tab-bar{display:flex;margin-bottom:10px}
    .tab{flex:1;padding:10px;text-align:center;cursor:pointer;border:none;background:#f1f3f5}
    .tab.active{background:#0071e3;color:#fff}

    .panel-container{position:relative}
    .panel{display:none}
    .panel.active{display:block}

    .section{margin-bottom:12px}
    label{font-weight:500;font-size:14px;margin-bottom:4px;display:block}
    input{border-radius:6px;border:1px solid #ddd;padding:8px 10px;font-size:14px;width:100%}
    button{border-radius:6px;border:none;color:#fff;padding:10px;width:100%;cursor:pointer;margin-top:6px}
    .btn-register{background:#28a745}
    .btn-login{background:#0071e3}
    .btn-change{background:#17a2b8}
    .code-box{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .code-box label{white-space:nowrap;width:100px;margin:0}
    .code-box input{flex:1}
    .code-box button{width:auto;padding:8px 10px;background:#6c757d;white-space:nowrap}
    .code-box button:disabled{background:#aaa}
    .log-box{height:120px;background:#f8f9fa;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:12px;white-space:pre-wrap;overflow-y:auto;margin-top:6px}
  </style>
</head>

<body>
  <div id="statusText" class="status status-info">就绪</div>

  <div class="card">
    <div class="tab-bar">
      <div class="tab" id="tab1" onclick="showPanel(1)">注册</div>
      <div class="tab" id="tab2" onclick="showPanel(2)">登录</div>
      <div class="tab" id="tab3" onclick="showPanel(3)">修改密码</div>
    </div>

    <div class="panel-container">
      <!-- ========== 注册面板 ========== -->
      <div class="panel" id="panel1">
        <div class="section">
          <label>用户名</label>
          <input id="reg_user" placeholder="注册用户名">
        </div>
        <div class="section">
          <label>密码</label>
          <input id="reg_pwd" type="password" placeholder="密码">
        </div>

        <div class="code-box">
          <label>请输入验证码</label>
          <input id="code1" placeholder="验证码">
          <button id="btnCode1" onclick="getCode(1)">获取验证码</button>
        </div>

        <button class="btn-register" onclick="doRegister()">注册</button>
      </div>

      <!-- ========== 登录面板 ========== -->
      <div class="panel" id="panel2">
        <div class="section">
          <label>用户名</label>
          <input id="login_user" placeholder="登录用户名">
        </div>
        <div class="section">
          <label>密码</label>
          <input id="login_pwd" type="password" placeholder="密码">
        </div>

        <div class="code-box">
          <label>请输入验证码</label>
          <input id="code2" placeholder="验证码">
          <button id="btnCode2" onclick="getCode(2)">获取验证码</button>
        </div>

        <button class="btn-login" onclick="doLogin()">登录</button>
      </div>

      <!-- ========== 修改密码面板 ========== -->
      <div class="panel" id="panel3">
        <div class="section">
          <label>用户名</label>
          <input id="change_user" placeholder="用户名">
        </div>
        <div class="section">
          <label>旧密码</label>
          <input id="old_pwd" type="password" placeholder="旧密码">
        </div>
        <div class="section">
          <label>新密码</label>
          <input id="new_pwd" type="password" placeholder="新密码">
        </div>

        <div class="code-box">
          <label>请输入验证码</label>
          <input id="code3" placeholder="验证码">
          <button id="btnCode3" onclick="getCode(3)">获取验证码</button>
        </div>

        <button class="btn-change" onclick="doChangePassword()">修改密码</button>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:10px">
    <label>发送日志</label><div id="logSend" class="log-box"></div>
  </div>
  <div class="card">
    <label>返回日志</label><div id="logResp" class="log-box"></div>
  </div>

<script>
// ================= 全局保存正确的验证码 =================
let correctCode = "";

// ================= 配置 =================
const API_URL = "https://1408347752-dxgsap4qrj.ap-guangzhou.tencentscf.com";
const WEBHOOK_URL = "https://www.kdocs.cn/api/v3/ide/file/504393979179/script/V2-jCry7lblkwsPtTSmtjlWY/sync_task";

// ================= 标签切换 =================
function showPanel(num) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel'+num).classList.add('active');
  document.getElementById('tab'+num).classList.add('active');
}

// ================= URL 参数控制默认显示 =================
function getDefaultPanelFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const tab = params.get('tab');
  if (tab === 'register') return 1;
  if (tab === 'login') return 2;
  if (tab === 'changepwd') return 3;
  return 2;
}

// ================= 状态 =================
function setStatus(text, isError=false) {
  const el = document.getElementById("statusText");
  el.innerText = text;
  el.className = "status " + (isError ? "status-error" : "status-success");
}

// ================= 生成验证码 =================
let codeLock = false;
const cooldown = 10;

function getCode(panel) {
  if (codeLock) return;
  codeLock = true;

  let btn = document.getElementById("btnCode" + panel);
  let originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = "10秒后重试";

  setTimeout(() => {
    const chars = "ABCDEFGHJKLMNPQRSTWXYZ23456789";
    let code = "";
    for (let i = 0; i < 6; i++) {
      code += chars[Math.floor(Math.random() * chars.length)];
    }
    correctCode = code;
    alert("验证码：" + code);
  }, 1000);

  setTimeout(() => {
    codeLock = false;
    btn.disabled = false;
    btn.innerText = originalText;
  }, cooldown * 1000);
}

// ===================== 验证码校验函数 =====================
function checkCode(inputId) {
  const userInput = document.getElementById(inputId).value.trim();
  if (!userInput) {
    alert("请填入验证码！");
    return false;
  }
  if (userInput !== correctCode) {
    alert("请填入正确的验证码！");
    return false;
  }
  return true;
}

// ==============================================
// 注册（带验证码校验）
// ==============================================
async function doRegister() {
  if (!checkCode("code1")) return;

  const u = document.getElementById('reg_user').value.trim();
  const p = document.getElementById('reg_pwd').value.trim();
  if (!u || !p) { setStatus('请填写完整',true); return; }

  setStatus('注册中...');
  const body = {
    webhookUrl: WEBHOOK_URL,
    message: { Context: { argv: { "登录行为":"注册","用户名":u,"密码":p } } }
  };
  document.getElementById('logSend').innerText = JSON.stringify(body,null,2);
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const txt = await res.text();
    document.getElementById('logResp').innerText = txt;
    const d = JSON.parse(txt).data?.result || JSON.parse(txt);
    if (d.TZbianhao===501) { setStatus('注册成功'); alert('注册成功'); }
    else { setStatus(d.tongzhi,true); alert(d.tongzhi); }
  } catch(e) { setStatus('异常：'+e,true); }
}

// ==============================================
// 登录（带验证码校验）
// ==============================================
async function doLogin() {
  if (!checkCode("code2")) return;

  const u = document.getElementById('login_user').value.trim();
  const p = document.getElementById('login_pwd').value.trim();
  if (!u || !p) { setStatus('请填写完整',true); return; }

  setStatus('登录中...');
  const body = {
    webhookUrl: WEBHOOK_URL,
    message: { Context: { argv: { "登录行为":"登录","用户名":u,"密码":p } } }
  };
  document.getElementById('logSend').innerText = JSON.stringify(body,null,2);
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const txt = await res.text();
    document.getElementById('logResp').innerText = txt;
    const d = JSON.parse(txt).data?.result || JSON.parse(txt);
    if (d.TZbianhao===501) {
      setStatus('登录成功'); 
      alert('登录成功'); 
      localStorage.setItem('yonghuID',u);
      // 发送登录成功通知给父窗口
      window.parent.postMessage('loginSuccess', '*');
    }
    else { setStatus(d.tongzhi,true); alert(d.tongzhi); }
  } catch(e) { setStatus('异常：'+e,true); }
}

// ==============================================
// 修改密码（带验证码校验）
// ==============================================
async function doChangePassword() {
  if (!checkCode("code3")) return;

  const u = document.getElementById('change_user').value.trim();
  const oldP = document.getElementById('old_pwd').value.trim();
  const newP = document.getElementById('new_pwd').value.trim();
  if (!u || !oldP || !newP) { setStatus('请填写完整',true); return; }

  setStatus('修改中...');
  const body = {
    webhookUrl: WEBHOOK_URL,
    message: { Context: { argv: { "登录行为":"修改密码","用户名":u,"密码":newP,"旧密码":oldP } } }
  };
  document.getElementById('logSend').innerText = JSON.stringify(body,null,2);
  try {
    const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const txt = await res.text();
    document.getElementById('logResp').innerText = txt;
    const d = JSON.parse(txt).data?.result || JSON.parse(txt);
    if (d.TZbianhao===501) { setStatus('修改成功'); alert('修改成功'); }
    else { setStatus(d.tongzhi,true); alert(d.tongzhi); }
  } catch(e) { setStatus('异常：'+e,true); }
}

// 初始化
window.onload = () => {
  showPanel(getDefaultPanelFromUrl());
}
</script>
</body>
</html>
